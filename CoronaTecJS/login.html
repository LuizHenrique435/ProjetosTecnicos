    <title>CORONATEC - LOGIN</title>

    <style type="text/css">
    input[type=text]{
      background-color: black;
    }
    input[type=password]{
      background-color: black;
    }
    textarea:focus,
    input[type=text]:focus,
    input[type=password]:focus{
      background-color: #198754;
    }

       

    </style>


  </head>
  <body style="background-color: black">
<center>
    <div class="col-5" style="text-align: center; border-style: solid; border-width: 2px; border-color: #198754; margin-top: 100px; background-color: black">
    <h1 style="text-align: center; margin-top: 30px; color: #198754; padding-bottom: 70px">CORONATEC - LOGIN</h1>

    <div class="mb-3 row">
      <label for="staticEmail" class="col-sm-2 col-form-label" style="color: #198754">Usuario : </label>
      <div class="col-sm-8">
        <input type="text" class="form-control" placeholder="Usuario" id="usuario" style="border-width: 3px ;border-color: #198754; color: white ">
      </div>
    </div>
    <div class="mb-3 row">
      <label for="inputPassword" class="col-sm-2 col-form-label" style="color: #198754">Senha : </label>
      <div class="col-sm-8">
        <input type="password" class="form-control" id="senha" placeholder="Senha" style="border-width: 3px ;border-color: #198754; color: white">
      </div>
      <center>
      <div class="col-8" style="margin-top: 40px;">
      <button type="button" class="btn btn-outline-success" onclick="login()">LOGIN</button>
      <a href="cadastro.html">
      <button type="button" class="btn btn-outline-success">CADASTRO</button>
    </a>
    </div>
  </center>
    </div>

    </div>
  </center>
